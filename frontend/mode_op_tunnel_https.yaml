mode_operatoire:
  nom: "Démo smartphone via box + HTTPS (ngrok)"
  objectif: "Publier la landing page en HTTPS valide sans domaine personnel"
  prerequis:
    - "PC hôte connecté à Internet"
    - "PC hôte et smartphones connectés à la même box Wi-Fi"
    - "Docker et Docker Compose installés"
    - "Compte ngrok + authtoken"

  principe:
    - "La landing page reste servie localement sur le port 8081"
    - "ngrok expose ce port via une URL HTTPS publique"
    - "Le QR code pointe vers l'URL HTTPS ngrok"

  preparation_avant_jour_j:
    - "Démarrer les services applicatifs: docker compose up -d --build"
    - "Vérifier la landing locale: http://localhost:8081"
    - "Installer ngrok (https://ngrok.com/download)"
    - "Configurer le token ngrok: ngrok config add-authtoken <NGROK_AUTHTOKEN>"

  lancement_jour_j:
    etapes:
      - ordre: 1
        action: "Lancer les conteneurs"
        commande: "docker compose up -d"
      - ordre: 2
        action: "Vérifier que landing répond"
        commande: "curl -I http://localhost:8081"
      - ordre: 3
        action: "Ouvrir le tunnel HTTPS vers la landing"
        commande: "ngrok http 8081"
      - ordre: 4
        action: "Copier l'URL HTTPS affichée par ngrok (ex: https://xxxx-xx-xx-xx-xx.ngrok-free.app)"
      - ordre: 5
        action: "Tester l'URL HTTPS depuis le smartphone"
      - ordre: 6
        action: "Générer le QR code vers cette URL HTTPS"

  parcours_utilisateur_attendu:
    - "Scan QR code"
    - "Ouverture landing HTTPS"
    - "Clic sur le bouton Tester la démo"
    - "Redirection vers /user/ (SPA)"

  commandes_utiles:
    - "docker compose ps"
    - "docker compose logs -f frontend"

  checklist_validation:
    - "HTTPS valide (cadenas visible dans le navigateur)"
    - "Landing accessible sur smartphone"
    - "Bouton Tester la démo fonctionnel"
    - "SPA accessible via /user"
    - "Aucun avertissement certificat"

  depannage_rapide:
    - symptome: "Le QR code ouvre une page inaccessible"
      actions:
        - "Vérifier que ngrok tourne encore"
        - "Vérifier que l'URL du QR est la bonne URL HTTPS ngrok"
        - "Vérifier que docker compose ps montre frontend actif"
    - symptome: "La landing s'ouvre mais le bouton échoue"
      actions:
        - "Vérifier que l'URL du bouton est /user/"
        - "Vérifier les logs du service frontend"
        - "Vérifier que la SPA est healthy"
    - symptome: "L'application est lente"
      actions:
        - "Éviter les recalculs lourds"
        - "Basculer sur données synthétiques si nécessaire"

  fin_de_demo:
    - "Arrêter ngrok (Ctrl+C)"
    - "Arrêter les services: docker compose down"

  notes_importantes:
    - "L'URL ngrok change à chaque relance en plan gratuit"
    - "Toujours régénérer le QR code avec l'URL du jour"
    - "Conserver un smartphone de secours déjà connecté à la box"
